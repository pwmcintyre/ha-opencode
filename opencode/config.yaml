# https://developers.home-assistant.io/docs/add-ons/configuration
name: OpenCode
version: "1.0.0"
slug: opencode
description: "AI coding agent with web UI — run OpenCode on your Home Assistant instance"
url: "https://github.com/pwmcintyre/ha-opencode"
image: ghcr.io/pwmcintyre/ha-opencode:1.0.0
arch:
  - aarch64
  - amd64
init: false
ports:
  4096/tcp: 4096
ports_description:
  4096/tcp: "OpenCode Web UI"
host_network: false
map:
  - addon_config:rw
options:
  server_password: ""
  anthropic_api_key: ""
  openai_api_key: ""
  port: 4096
schema:
  server_password: "str"
  anthropic_api_key: "str?"
  openai_api_key: "str?"
  port: "int(1024,65535)"
